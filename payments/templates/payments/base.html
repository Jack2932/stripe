<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Bean & Bubble{% endblock %}</title>
    <style>
        :root { --bg:#0a0f1f; --card:rgba(255,255,255,.08); --card2:rgba(255,255,255,.12); --text:#eef4ff; --muted:#9daac1; --line:rgba(255,255,255,.14); --accent:#b86bff; --accent2:#ffb86b; --good:#42f5b0; --bad:#ff6b7a; }
        * { box-sizing: border-box; }
        body { margin:0; min-height:100vh; font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:radial-gradient(circle at 12% 10%, rgba(184,107,255,.28), transparent 35%), radial-gradient(circle at 82% 0%, rgba(255,184,107,.18), transparent 30%), linear-gradient(135deg, #110b12, #1c1324 52%, #0d0b12); color:var(--text); }
        body:before { content:""; position:fixed; inset:0; pointer-events:none; background-image:linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px); background-size:42px 42px; mask-image:linear-gradient(to bottom, black, transparent 88%); }
        a { color:#b8dcff; text-decoration:none; }
        a:hover { color:white; }
        .page { width:min(1120px, calc(100% - 32px)); margin:0 auto; padding:28px 0 60px; position:relative; }
        .topbar { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:28px; padding:14px 16px; border:1px solid var(--line); border-radius:24px; background:rgba(9,14,29,.72); backdrop-filter:blur(18px); box-shadow:0 24px 80px rgba(0,0,0,.28); }
        .brand { display:flex; align-items:center; gap:12px; font-weight:900; letter-spacing:.4px; }
        .logo { width:42px; height:42px; border-radius:15px; display:grid; place-items:center; color:white; background:linear-gradient(135deg, var(--accent), var(--accent2)); box-shadow:0 0 34px rgba(184,107,255,.45); }
        .nav { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
        .nav a, .pill { padding:10px 14px; border-radius:999px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.09); color:var(--text); font-size:14px; }
        .hero { display:grid; grid-template-columns:1.05fr .95fr; gap:22px; align-items:stretch; margin-bottom:22px; }
        .panel, .card { border:1px solid var(--line); border-radius:28px; background:linear-gradient(180deg, rgba(255,255,255,.105), rgba(255,255,255,.055)); box-shadow:0 24px 70px rgba(0,0,0,.3); backdrop-filter:blur(18px); }
        .panel { padding:34px; overflow:hidden; position:relative; }
        .panel:after { content:""; position:absolute; right:-70px; top:-70px; width:210px; height:210px; border-radius:50%; background:linear-gradient(135deg, rgba(124,92,255,.5), rgba(18,216,250,.18)); filter:blur(4px); }
        .eyebrow { color:var(--good); font-weight:800; text-transform:uppercase; font-size:12px; letter-spacing:1.2px; }
        h1 { margin:10px 0 12px; font-size:clamp(34px, 5vw, 62px); line-height:.96; letter-spacing:-2px; }
        h2 { margin:0 0 14px; font-size:26px; }
        h3 { margin:0 0 8px; }
        .muted { color:var(--muted); line-height:1.65; }
        .grid { display:grid; grid-template-columns:repeat(3, minmax(0, 1fr)); gap:18px; }
        .card { padding:20px; transition:.2s ease; }
        .card:hover { transform:translateY(-3px); border-color:rgba(18,216,250,.34); }
        .product-art { height:150px; border-radius:22px; margin-bottom:16px; background:radial-gradient(circle at 30% 25%, rgba(255,255,255,.55), transparent 8%), linear-gradient(135deg, rgba(184,107,255,.72), rgba(255,184,107,.42)); display:grid; place-items:center; font-size:42px; font-weight:900; }
        .price { font-size:24px; font-weight:900; margin:14px 0; }
        .actions { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
        .button { border:0; border-radius:16px; background:linear-gradient(135deg, var(--accent), var(--accent2)); color:white; padding:12px 17px; cursor:pointer; font-weight:800; text-decoration:none; display:inline-flex; align-items:center; gap:8px; box-shadow:0 12px 32px rgba(124,92,255,.32); }
        .button.secondary { background:rgba(255,255,255,.08); box-shadow:none; border:1px solid var(--line); }
        .button.danger { background:rgba(255,107,122,.14); box-shadow:none; border:1px solid rgba(255,107,122,.35); }
        .button:disabled { opacity:.55; cursor:wait; }
        .error { color:var(--bad); margin-top:12px; }
        .success { color:var(--good); }
        table { width:100%; border-collapse:collapse; }
        th, td { text-align:left; border-bottom:1px solid var(--line); padding:14px 8px; }
        input[type=number] { width:78px; border:1px solid var(--line); border-radius:12px; padding:10px; color:var(--text); background:rgba(255,255,255,.08); }
        .status { display:inline-flex; padding:7px 10px; border-radius:999px; font-size:12px; font-weight:900; border:1px solid var(--line); }
        .status.paid { color:var(--good); background:rgba(66,245,176,.09); }
        .empty { text-align:center; padding:52px 18px; }
        @media (max-width: 860px) { .hero { grid-template-columns:1fr; } .grid { grid-template-columns:1fr; } .topbar { align-items:flex-start; flex-direction:column; } }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
<div class="page">
    <header class="topbar">
        <a class="brand" href="{% url 'payments:item_list' %}"><span class="logo">B</span><span>Bean & Bubble</span></a>
        <nav class="nav">
            <a href="{% url 'payments:item_list' %}">Каталог</a>
            <a href="{% url 'payments:cart' %}">Корзина{% if cart_count %} · {{ cart_count }}{% endif %}</a>
            <a href="{% url 'payments:paid_orders' %}">Оплаченные</a>
            <a href="/admin/">Админка</a>
        </nav>
    </header>
    {% block content %}{% endblock %}
</div>
</body>
</html>
